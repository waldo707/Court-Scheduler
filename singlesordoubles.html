<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pickleball Scheduler</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: system-ui, Arial, sans-serif;
  padding: 20px;
  background: #f4f4f4;
}
h1, h2, h3 { text-align: center; }
label {
  display:block;
  margin-top:12px;
  font-weight:600;
}
textarea, input, button {
  font-size:18px;
  padding:10px;
  width:100%;
  margin-top:6px;
}
button {
  background:#007acc;
  color:white;
  border:none;
  border-radius:12px;
  margin-top:14px;
}
.secondary { background:#666; }
.timer {
  font-size:64px;
  font-weight:800;
  text-align:center;
  margin:20px 0;
}
.matchup {
  margin:22px 0;
  text-align:center;
}
.court-label { font-weight:700; }
.team { font-size:22px; font-weight:600; }
.vs { opacity:0.6; margin:6px; }
</style>
</head>

<body>

<!-- ===== MENU ===== -->
<div id="menuView">
  <h1>Court Scheduler</h1>

  <label>Number of Players</label>
  <input id="numPlayersInput" type="number" min="1">
  <button class="secondary" onclick="createPlayersFromNumber()">Create Players</button>

  <label>Players</label>
  <textarea id="playersInput"></textarea>

  <input id="playerActionInput" placeholder="Type player number/name">
  <button onclick="addPlayer()">Add Player</button>
  <button class="secondary" onclick="removePlayer()">Delete Player</button>

  <label>Match Type</label>
  <label><input type="radio" name="matchType" value="doubles" checked> Doubles</label>
  <label><input type="radio" name="matchType" value="singles"> Singles</label>

  <label>Courts</label>
  <input id="courtsInput" type="number" min="1" value="1">

  <label>Match Length (minutes)</label>
  <input id="timerMinutesInput" type="number" min="1" value="8">

<button onclick="resumeSchedule()">
  Resume Schedule
</button>


  <button onclick="start()">Generate Schedule (Start Over)</button>
</div>

<!-- ===== ROUND VIEW ===== -->
<div id="roundView" style="display:none;">
  <h2>Current Round</h2>
  <div id="roundMatches"></div>

  <div id="timerDisplay" class="timer">00:00</div>

  <button onclick="startTimer()">Start Timer</button>
  <button onclick="pauseTimer()">Pause</button>
  <button onclick="nextRound()">Next Round</button>
  <button class="secondary" onclick="goToMenu()">Menu</button>
</div>

<script>
// ================= STATE =================
let players = [];
let matchType = "doubles";
let courts = 1;

let sessionActive = false;
let nextMatches = null;
let resumeTimerSeconds = null;


let playCount = {};
let sitoutStreak = {};
let hasSatOut = {};
let partnerCount = {};

let currentMatches = [];

let timerSeconds = 0;
let timerInterval = null;

// ================= HELPERS =================
function playersPerCourt() {
  return matchType === "singles" ? 2 : 4;
}

function calculateCourts(count, requested) {
  return Math.min(requested, Math.floor(count / playersPerCourt()));
}

function formatTeam(t) {
  return t.join(" & ");
}

// ================= PLAYER MANAGEMENT =================


function createPlayersFromNumber() {
  try {
    const input = document.getElementById("numPlayersInput");
    const playersBox = document.getElementById("playersInput");

    if (!input || !playersBox) {
      alert("Required input fields not found in the page.");
      return;
    }

    const n = parseInt(input.value, 10);

    if (!Number.isInteger(n) || n < 1) {
      alert("Please enter a valid number of players.");
      return;
    }

    const list = [];
    for (let i = 1; i <= n; i++) {
      list.push(String(i));
    }

    playersBox.value = list.join(", ");

  } catch (err) {
    alert("Create Players failed.\n\n" + err.message);
    console.error(err);
  }
}

function addPlayer() {
  const name = playerActionInput.value.trim();
  if (!name) return;

  let list = playersInput.value.split(",").map(p=>p.trim()).filter(Boolean);
  if (list.includes(name)) return alert("Player already exists.");

  list.push(name);
  playersInput.value = list.join(", ");
  playerActionInput.value = "";
}

function removePlayer() {
  const name = playerActionInput.value.trim();
  if (!name) return;

  let list = playersInput.value.split(",").map(p=>p.trim()).filter(Boolean);
  if (!list.includes(name)) return alert("Player not found.");

  list = list.filter(p=>p!==name);
  playersInput.value = list.join(", ");

  delete playCount[name];
  delete sitoutStreak[name];
  delete hasSatOut[name];
  delete partnerCount[name];
}

// ================= SCHEDULING =================
function selectSitouts(players, slots) {
  const sitCount = players.length - slots;
  if (sitCount <= 0) return [];

  const neverSat = players.filter(p=>!hasSatOut[p]);
  const pool = neverSat.length >= sitCount ? neverSat : players;

  return pool
    .sort((a,b)=>playCount[b]-playCount[a])
    .slice(0, sitCount);
}

function generateRound() {
  const slots = courts * playersPerCourt();
  let matches = []; // ✅ DECLARED ONCE

  // Ensure state exists
  players.forEach(p => {
    playCount[p] ??= 0;
    sitoutStreak[p] ??= 0;
    hasSatOut[p] ??= false;
    partnerCount[p] ??= {};
  });

  // Select sit-outs
  const sitouts = selectSitouts(players, slots);

  players.forEach(p => {
    if (sitouts.includes(p)) {
      sitoutStreak[p]++;
      hasSatOut[p] = true;
    } else {
      sitoutStreak[p] = 0;
    }
  });

  const playing = players.filter(p => !sitouts.includes(p));

  /* ===================== SINGLES ===================== */
  if (matchType === "singles") {
    let pool = [...playing].sort(() => Math.random() - 0.5);

    while (pool.length >= 2) {
      const a = pool.shift();
      const b = pool.shift();

      matches.push({
        teamA: [a],
        teamB: [b]
      });

      playCount[a]++;
      playCount[b]++;
    }

   return matches;
  }

  /* ===================== DOUBLES ===================== */
  let pool = [...playing].sort(() => Math.random() - 0.5);

  while (pool.length >= 4) {
    let bestCombo = null;
    let bestScore = Infinity;

    for (let i = 0; i < pool.length; i++) {
      for (let j = i + 1; j < pool.length; j++) {
        for (let k = 0; k < pool.length; k++) {
          for (let l = k + 1; l < pool.length; l++) {

            if (new Set([i, j, k, l]).size < 4) continue;

            const a = pool[i], b = pool[j];
            const c = pool[k], d = pool[l];

            const partnerPenalty =
              (partnerCount[a][b] || 0) +
              (partnerCount[c][d] || 0);

            const min = Math.min(
              playCount[a], playCount[b],
              playCount[c], playCount[d]
            );

            const balancePenalty =
              (playCount[a] - min) +
              (playCount[b] - min) +
              (playCount[c] - min) +
              (playCount[d] - min);

            const score = partnerPenalty * 10 + balancePenalty;

            if (score < bestScore) {
              bestScore = score;
              bestCombo = [a, b, c, d];
            }
          }
        }
      }
    }

    const [a, b, c, d] = bestCombo;

    matches.push({
      teamA: [a, b],
      teamB: [c, d]
    });

    partnerCount[a][b] = (partnerCount[a][b] || 0) + 1;
    partnerCount[b][a] = partnerCount[a][b];
    partnerCount[c][d] = (partnerCount[c][d] || 0) + 1;
    partnerCount[d][c] = partnerCount[c][d];

    playCount[a]++;
    playCount[b]++;
    playCount[c]++;
    playCount[d]++;

    pool = pool.filter(p => ![a, b, c, d].includes(p));
  }

 return matches;
}

// ================= FLOW =================
function start() {
  players = playersInput.value.split(",").map(p=>p.trim()).filter(Boolean);
  if (players.length < playersPerCourt()) {
    alert("Not enough players.");
    return;
  }

  matchType = document.querySelector("input[name='matchType']:checked").value;
  courts = calculateCourts(players.length, parseInt(courtsInput.value));

  playCount = {}; sitoutStreak = {}; hasSatOut = {}; partnerCount = {};

  timerSeconds = parseInt(timerMinutesInput.value)*60;

  currentMatches = generateRound();
nextMatches = generateRound();
sessionActive = true;

  render();

  menuView.style.display = "none";
  roundView.style.display = "block";
}

function nextRound() {
  
stopTimer();
  timerSeconds = parseInt(timerMinutesInput.value, 10) * 60;

  currentMatches = nextMatches;
  nextMatches = generateRound();

  render();
}

function resumeSchedule() {
  if (!sessionActive || !currentMatches) {
    alert("No active schedule to resume.");
    return;
  }

  menuView.style.display = "none";
  roundView.style.display = "block";

  // Restore timer if it was running
  if (resumeTimerSeconds !== null) {
    timerSeconds = resumeTimerSeconds;
    updateTimer();
  }

  render();
}




function goToMenu() {
  if (timerInterval) {
    resumeTimerSeconds = timerSeconds;
    stopTimer();
  } else {
    resumeTimerSeconds = null;
  }

  roundView.style.display = "none";
  menuView.style.display = "block";
}

// ================= TIMER =================
function startTimer() {
  if (timerInterval) return;
  timerInterval = setInterval(()=>{
    if (timerSeconds <= 0) {
      stopTimer();
      alert("Time!");
      return;
    }
    timerSeconds--;
    updateTimer();
  },1000);
}

function pauseTimer() {
  stopTimer();
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

function updateTimer() {
  const m = String(Math.floor(timerSeconds/60)).padStart(2,"0");
  const s = String(timerSeconds%60).padStart(2,"0");
  timerDisplay.textContent = `${m}:${s}`;
}

// ================= RENDER =================
function render() {
  updateTimer();
  roundMatches.innerHTML = currentMatches.map((m,i)=>`
    <div class="matchup">
      <div class="court-label">Court ${i+1}</div>
      <div class="team">${formatTeam(m.teamA)}</div>
      <div class="vs">vs</div>
      <div class="team">${formatTeam(m.teamB)}</div>
    </div>`).join("");
}
</script>
</body>
</html>
