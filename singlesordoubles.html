<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pickleball Scheduler</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: system-ui, Arial, sans-serif;
  padding: 20px;
  background: #f4f4f4;
}
h1, h2, h3 { text-align: center; }
label { display:block; margin-top:12px; font-weight:600; }
input, textarea, button {
  font-size:18px;
  width:100%;
  padding:10px;
  margin-top:6px;
}
button {
  background:#007acc;
  color:white;
  border:none;
  border-radius:12px;
  margin-top:14px;
}
.secondary { background:#666; }
.timer { font-size:64px; font-weight:800; text-align:center; }
.matchup { margin:22px 0; text-align:center; }
.court-label { font-weight:700; }
.team { font-size:22px; font-weight:600; }
.vs { opacity:.6; margin:6px; }
</style>
</head>

<body>

<div id="menuView">
<h1>Court Scheduler</h1>

<label>Number of Players</label>
<input id="numPlayersInput" type="number">
<button class="secondary" onclick="createPlayersFromNumber()">Create Players</button>

<label>Players</label>
<textarea id="playersInput"></textarea>

<label>Match Type</label>
<label><input type="radio" name="matchType" value="doubles" checked> Doubles</label>
<label><input type="radio" name="matchType" value="singles"> Singles</label>

<label>Courts</label>
<input id="courtsInput" type="number" value="1">

<button onclick="start()">Generate Schedule</button>
</div>

<div id="roundView" style="display:none;">
<h2>Current Round</h2>
<div id="currentRound"></div>
<button onclick="nextRound()">Next Round</button>
<button class="secondary" onclick="goToMenu()">Menu</button>
</div>

<script>
// ====================== STATE ======================
let players = [];
let courts = 1;
let matchType = "doubles";

let playCount = {};
let sitoutStreak = {};
let partnerCount = {};
let hasSatOut = {};

let currentRound = null;

// ====================== HELPERS ======================
function playersPerCourt() {
  return matchType === "singles" ? 2 : 4;
}

function calculateCourts(count, requested) {
  return Math.min(requested, Math.floor(count / playersPerCourt()));
}

function formatTeam(t) {
  return t.join(" & ");
}

// ====================== PLAYER CREATION ======================
function createPlayersFromNumber() {
  const n = parseInt(numPlayersInput.value);
  if (!n || n < 1) return;
  playersInput.value =
    Array.from({ length:n },(_,i)=>i+1).join(", ");
}

// ====================== SITOUT SELECTION ======================
function selectSitouts(players, slots) {
  const sitCount = players.length - slots;
  if (sitCount <= 0) return [];

  const neverSat = players.filter(p => !hasSatOut[p]);
  const pool = neverSat.length >= sitCount ? neverSat : players;

  return pool
    .sort((a,b)=>playCount[b]-playCount[a])
    .slice(0, sitCount);
}

// ====================== ROUND GENERATION ======================
function generateRound() {
  const slots = courts * playersPerCourt();

  players.forEach(p=>{
    playCount[p] ??= 0;
    sitoutStreak[p] ??= 0;
    partnerCount[p] ??= {};
    hasSatOut[p] ??= false;
  });

  const sitouts = selectSitouts(players, slots);

  players.forEach(p=>{
    if (sitouts.includes(p)) {
      sitoutStreak[p]++;
      hasSatOut[p] = true;
    } else {
      sitoutStreak[p] = 0;
    }
  });

  const playing = players.filter(p=>!sitouts.includes(p));

  // ---------- SINGLES ----------
  if (matchType === "singles") {
    const matches = [];
    const pool = [...playing].sort(()=>Math.random()-0.5);
    while(pool.length>=2) {
      const a = pool.shift();
      const b = pool.shift();
      playCount[a]++; playCount[b]++;
      matches.push({ teamA:[a], teamB:[b] });
    }
    return matches;
  }

  // ---------- DOUBLES ----------
  const matches = [];
  let pool = [...playing];

  while(pool.length>=4) {
    let best=null, bestScore=Infinity;

    for(let i=0;i<pool.length;i++)
    for(let j=i+1;j<pool.length;j++)
    for(let k=0;k<pool.length;k++)
    for(let l=k+1;l<pool.length;l++) {
      if(new Set([i,j,k,l]).size<4) continue;
      const [a,b,c,d]=[pool[i],pool[j],pool[k],pool[l]];
      const ps = (partnerCount[a][b]||0)+(partnerCount[c][d]||0);
      const min = Math.min(playCount[a],playCount[b],playCount[c],playCount[d]);
      const bs = (playCount[a]+playCount[b]+playCount[c]+playCount[d]-4*min);
      const score = ps*10 + bs;
      if(score<bestScore) {
        bestScore=score;
        best=[a,b,c,d];
      }
    }

    const [a,b,c,d]=best;
    matches.push({ teamA:[a,b], teamB:[c,d] });
    partnerCount[a][b]=(partnerCount[a][b]||0)+1;
    partnerCount[b][a]=partnerCount[a][b];
    partnerCount[c][d]=(partnerCount[c][d]||0)+1;
    partnerCount[d][c]=partnerCount[c][d];
    playCount[a]++; playCount[b]++; playCount[c]++; playCount[d]++;
    pool = pool.filter(p=>![a,b,c,d].includes(p));
  }
  return matches;
}

// ====================== FLOW ======================
function start() {
  players = playersInput.value.split(",").map(p=>p.trim());
  matchType = document.querySelector("input[name='matchType']:checked").value;
  courts = calculateCourts(players.length, parseInt(courtsInput.value));

  playCount={}; sitoutStreak={}; partnerCount={}; hasSatOut={};
  players.forEach(p=>{ playCount[p]=0; sitoutStreak[p]=0; partnerCount[p]={}; hasSatOut[p]=false; });

  currentRound = generateRound();
  render();
  menuView.style.display="none";
  roundView.style.display="block";
}

function nextRound() {
  currentRound = generateRound();
  render();
}

function goToMenu() {
  menuView.style.display="block";
  roundView.style.display="none";
}

// ====================== RENDER ======================
function render() {
  currentRound.innerHTML = currentRound.map((m,i)=>`
    <div class="matchup">
      <div class="court-label">Court ${i+1}</div>
      <div class="team">${formatTeam(m.teamA)}</div>
      <div class="vs">vs</div>
      <div class="team">${formatTeam(m.teamB)}</div>
    </div>`).join("");
}
</script>
</body>
</html>
