<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pickleball Scheduler</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: system-ui, Arial, sans-serif;
      padding: 20px;
      background: #f4f4f4;
    }
    h1, h2 {
      text-align: center;
    }
    input, button {
      font-size: 18px;
      padding: 10px;
      width: 100%;
      margin-top: 10px;
    }
    button {
      background: #007acc;
      border: none;
      color: white;
      border-radius: 8px;
    }
    .card {
      background: white;
      padding: 14px;
      margin-top: 12px;
      border-radius: 8px;
      text-align: center;
    }
    hr {
      margin: 10px 0;
    }
  </style>
</head>

<body>

<h1>Pickleball Scheduler</h1>

<label>Player names (comma separated)</label>
<input id="playersInput" placeholder="Alex, Sam, Jordan, Riley">

<label>Number of courts</label>
<input id="courtsInput" type="number" min="1" value="1">

<button onclick="start()">Generate First Round</button>

<div id="output"></div>

<button onclick="nextRound()">Next Round</button>

<script>
/* ===================== STATE ===================== */

let players = [];
let courts = 1;
let playCount = {};
let usedPartners = new Set();

let currentRound = null;
let nextRoundData = null;
let sitoutStreak = {};   // consecutive sit-outs per player


/* ===================== HELPERS ===================== */

function key(a, b) {
  return [a, b].sort().join("|");
}

/* ===================== ROUND GENERATION ===================== */

function generateRound() {

  const SLOTS = courts * 4;
  let matches = [];

  // -------------------------------
  // Defensive init
  // -------------------------------
  players.forEach(p => {
    if (playCount[p] === undefined) playCount[p] = 0;
    if (sitoutStreak[p] === undefined) sitoutStreak[p] = 0;
  });

  // -------------------------------
  // PHASE 1: HARD ELIGIBILITY
  // -------------------------------

  // Highest sit-out streak in pool
  let maxSit = Math.max(...players.map(p => sitoutStreak[p]));

  // Players forced to play (cannot sit again)
  let forced = players.filter(p => sitoutStreak[p] === maxSit && maxSit >= 2);

  // Remaining candidates (excluding forced)
  let remaining = players.filter(p => !forced.includes(p));

  // Sort remaining strictly by fairness
  remaining.sort((a, b) => {
    if (playCount[a] !== playCount[b]) {
      return playCount[a] - playCount[b]; // least games first
    }
    return Math.random() - 0.5; // tie-break only
  });

  // Final selection of players who will play
  let playing = [...forced];

  for (let p of remaining) {
    if (playing.length >= SLOTS) break;
    playing.push(p);
  }

  let sitting = players.filter(p => !playing.includes(p));

  // Update sit-out streaks
  players.forEach(p => {
    if (playing.includes(p)) {
      sitoutStreak[p] = 0;
    } else {
      sitoutStreak[p]++;
    }
  });

  // -------------------------------
  // PHASE 2: PARTNER PAIRING
  // -------------------------------

  // Shuffle playing pool slightly for variety
  playing = [...playing].sort(() => Math.random() - 0.5);

  while (playing.length >= 4) {

    let group = playing.splice(0, 4);

    let combos = [
      [[group[0], group[1]], [group[2], group[3]]],
      [[group[0], group[2]], [group[1], group[3]]],
      [[group[0], group[3]], [group[1], group[2]]]
    ];

    // Score combos by partner reuse
    function score(combo) {
      let a = key(combo[0][0], combo[0][1]);
      let b = key(combo[1][0], combo[1][1]);
      return (usedPartners.has(a) ? 1 : 0) +
             (usedPartners.has(b) ? 1 : 0);
    }

    combos.sort((c1, c2) => score(c1) - score(c2));

    let chosen = combos[0];

    usedPartners.add(key(chosen[0][0], chosen[0][1]));
    usedPartners.add(key(chosen[1][0], chosen[1][1]));

    chosen[0].forEach(p => playCount[p]++);
    chosen[1].forEach(p => playCount[p]++);

    matches.push({
      court: matches.length + 1,
      teamA: chosen[0],
      teamB: chosen[1]
    });
  }

  return {
    matches,
    sitouts: sitting
  };
}


/* ===================== START / ADVANCE ===================== */

function start() {
  players = document.getElementById("playersInput").value
    .split(",")
    .map(p => p.trim())
    .filter(Boolean);

  courts = parseInt(document.getElementById("courtsInput").value);

playCount = {};
usedPartners.clear();
sitoutStreak = {};

players.forEach(p => {
  	playCount[p] = 0;
 	 sitoutStreak[p] = 0;
});


  currentRound = generateRound();
  nextRoundData = generateRound();

  render();
}

function nextRound() {
  currentRound = nextRoundData;
  nextRoundData = generateRound();
  render();
}

/* ===================== RENDER ===================== */

function renderRound(title, round) {
  let html = `<h2>${title}</h2>`;

  round.matches.forEach(m => {
    html += `
      <div class="card">
        <strong>Court ${m.court}</strong><br>
        ${m.teamA[0]} & ${m.teamA[1]}
        <hr>
        ${m.teamB[0]} & ${m.teamB[1]}
      </div>
    `;
  });

  if (round.sitouts.length) {
    html += `
      <div class="card">
        Sitting out:<br>${round.sitouts.join(", ")}
      </div>
    `;
  }

  return html;
}

function render() {
  let html = "";
  html += renderRound("Current Round", currentRound);
  html += renderRound("Next Match (Preview)", nextRoundData);
  document.getElementById("output").innerHTML = html;
}
</script>

</body>
</html>
