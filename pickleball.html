<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pickleball Scheduler (TEST)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: system-ui, Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    button {
      font-size: 18px;
      padding: 10px;
      margin-top: 10px;
      width: 100%;
    }
    .card {
      background: #fff;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
    }
    h2 {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>Pickleball Scheduler</h1>

<label>Player names (comma separated)</label>
<input id="playersInput" style="width:100%; font-size:16px;">
<br><br>

<label>Courts</label>
<input type="number" id="courtsInput" value="1" min="1" style="width:100%; font-size:16px;">

<button onclick="start()">Generate First Round</button>

<div id="output"></div>

<!-- ✅ SCRIPT MUST BE PLAIN -->
<script>

alert("SCRIPT LOADED");

// GLOBAL STATE
let players = [];
let courts = 1;

// BUTTON HANDLER
function start() {
  alert("START BUTTON CLICKED");

  players = document.getElementById("playersInput").value
    .split(",")
    .map(p => p.trim())
    .filter(Boolean);

  courts = parseInt(document.getElementById("courtsInput").value);

  let html = "<h2>Current Round</h2>";

  let index = 0;

  for (let c = 1; c <= courts; c++) {
    if (index + 3 >= players.length) break;

    html += `
      <div class="card">
        <strong>Court ${c}</strong><br>
        ${players[index]} & ${players[index+1]} <br>
        vs<br>
        ${players[index+2]} & ${players[index+3]}
      </div>
    `;
    index += 4;
  }

  document.getElementById("output").innerHTML = html;
}

</script>

</body>
</html>
``
