<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pickleball Scheduler</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: system-ui, Arial, sans-serif;
      padding: 20px;
      background: #f4f4f4;
    }
    h1, h2 {
      text-align: center;
    }
    label {
      margin-top: 10px;
      display: block;
    }
    input, button {
      font-size: 18px;
      padding: 10px;
      width: 100%;
      margin-top: 6px;
    }
    button {
      background: #007acc;
      border: none;
      color: white;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .card {
      background: white;
      padding: 14px;
      margin-top: 12px;
      border-radius: 8px;
      text-align: center;
    }
    hr {
      margin: 10px 0;
    }
  </style>
</head>

<body>

<h1>Pickleball Scheduler</h1>

<label>Player names (comma separated)</label>
<input id="playersInput" placeholder="Alex, Sam, Jordan, Riley">

<label>Number of courts</label>
<input id="courtsInput" type="number" min="1" value="1">

<button onclick="start()">Generate First Round</button>
<button onclick="nextRound()">Next Round</button>

<div id="output"></div>

<script>
/* ===================== STATE ===================== */

let players = [];
let courts = 1;
let playCount = {};
let sitoutStreak = {};
let partnerCount = {};

let currentRound = null;
let nextRoundData = null;

/* ===================== HELPERS ===================== */

function key(a, b) {
  return [a, b].sort().join("|");
}
function hasUnplayedPartner(player, partnerMap) {
  return Object.values(partnerMap[player]).some(count => count === 0);
}


/* ===================== ROUND GENERATION ===================== */
/*
  HARD‑CONSTRAINT ELIGIBILITY SCHEDULER
  Phase 1: Who plays (fairness enforced)
  Phase 2: How they are paired (minimize repeats)
*/

function generateRound() {

  const SLOTS = courts * 4;
  let matches = [];

  // Defensive initialization
  players.forEach(p => {
    if (playCount[p] === undefined) playCount[p] = 0;
    if (sitoutStreak[p] === undefined) sitoutStreak[p] = 0;
  });

  // ---------- Phase 1: Hard eligibility ----------

  let maxSit = Math.max(...players.map(p => sitoutStreak[p]));

  // Players who MUST play (already sat too long)
  let forced = players.filter(p => sitoutStreak[p] === maxSit && maxSit >= 2);

  // Remaining candidates
  let remaining = players.filter(p => !forced.includes(p));

  remaining.sort((a, b) => {
    if (playCount[a] !== playCount[b]) {
      return playCount[a] - playCount[b]; // fewer games first
    }
    return Math.random() - 0.5; // tie‑break only
  });

  let playing = [...forced];
  for (let p of remaining) {
    if (playing.length >= SLOTS) break;
    playing.push(p);
  }

  let sitting = players.filter(p => !playing.includes(p));

  // Update sit‑out streaks
  players.forEach(p => {
    if (playing.includes(p)) sitoutStreak[p] = 0;
    else sitoutStreak[p]++;
  });

 // ---------- Phase 2: Partner pairing with exhaustion ----------

// Small shuffle for visual variety (does NOT affect fairness)
playing = [...playing].sort(() => Math.random() - 0.5);

while (playing.length >= 4) {

  let group = playing.splice(0, 4);

  let combos = [
    [[group[0], group[1]], [group[2], group[3]]],
    [[group[0], group[2]], [group[1], group[3]]],
    [[group[0], group[3]], [group[1], group[2]]]
  ];

  // Score a pairing: lower score is better
  function scoreCombo(combo) {
    let [a1, a2] = combo[0];
    let [b1, b2] = combo[1];
    let score = 0;

    // Base penalty: how often these partners already occurred
    score += partnerCount[a1][a2];
    score += partnerCount[b1][b2];

    // HARD exhaustion rule:
    // forbid re-pairing if either player still has unplayed partners
    if (
      partnerCount[a1][a2] > 0 &&
      (hasUnplayedPartner(a1, partnerCount) ||
       hasUnplayedPartner(a2, partnerCount))
    ) {
      score += 1000;
    }

    if (
      partnerCount[b1][b2] > 0 &&
      (hasUnplayedPartner(b1, partnerCount) ||
       hasUnplayedPartner(b2, partnerCount))
    ) {
      score += 1000;
    }

    return score;
  }

  // Choose the lowest-penalty pairing
  combos.sort((c1, c2) => scoreCombo(c1) - scoreCombo(c2));
  let chosen = combos[0];

  // Record partner usage symmetrically
  partnerCount[chosen[0][0]][chosen[0][1]]++;
  partnerCount[chosen[0][1]][chosen[0][0]]++;
  partnerCount[chosen[1][0]][chosen[1][1]]++;
  partnerCount[chosen[1][1]][chosen[1][0]]++;

  // Increment play counts
  chosen[0].forEach(p => playCount[p]++);
  chosen[1].forEach(p => playCount[p]++);

  matches.push({
    court: matches.length + 1,
    teamA: chosen[0],
    teamB: chosen[1]
  });
}


/* ===================== START / ADVANCE ===================== */

function start() {
  players = document.getElementById("playersInput").value
    .split(",")
    .map(p => p.trim())
    .filter(Boolean);

  courts = parseInt(document.getElementById("courtsInput").value);

  playCount = {};
  sitoutStreak = {};
  partnerCount = {};

  players.forEach(p => {
    playCount[p] = 0;
    sitoutStreak[p] = 0;

    // Step 3: initialize partner exhaustion matrix
    partnerCount[p] = {};
    players.forEach(other => {
      if (p !== other) {
        partnerCount[p][other] = 0;
      }
    });
  });

  currentRound = generateRound();
  nextRoundData = generateRound();
  render();
}

/* ===================== RENDER ===================== */

function renderRound(title, round) {
  let html = "<h2>" + title + "</h2>";

  round.matches.forEach(m => {
    html +=
      "<div class='card'>" +
      "<strong>Court " + m.court + "</strong><hr>" +
      m.teamA[0] + " & " + m.teamA[1] + "<br>vs<br>" +
      m.teamB[0] + " & " + m.teamB[1] +
      "</div>";
  });

  if (round.sitouts.length > 0) {
    html +=
      "<div class='card'>Sitting out:<br>" +
      round.sitouts.join(", ") +
      "</div>";
  }

  return html;
}

function render() {
  document.getElementById("output").innerHTML =
    renderRound("Current Round", currentRound) +
    renderRound("Next Round (Preview)", nextRoundData);
}

</script>
</body>
</html>
