<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pickleball Scheduler</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: system-ui, Arial, sans-serif;
      padding: 20px;
      background: #f4f4f4;
    }
    h1, h2 {
      text-align: center;
    }
    input, button {
      font-size: 18px;
      padding: 10px;
      width: 100%;
      margin-top: 10px;
    }
    button {
      background: #007acc;
      border: none;
      color: white;
      border-radius: 8px;
    }
    .card {
      background: white;
      padding: 14px;
      margin-top: 12px;
      border-radius: 8px;
      text-align: center;
    }
    hr {
      margin: 10px 0;
    }
  </style>
</head>

<body>

<h1>Pickleball Scheduler</h1>

<label>Player names (comma separated)</label>
<input id="playersInput" placeholder="Alex, Sam, Jordan, Riley">

<label>Number of courts</label>
<input id="courtsInput" type="number" min="1" value="1">

<button onclick="start()">Generate First Round</button>

<div id="output"></div>

<button onclick="nextRound()">Next Round</button>

<script>
/* ===================== STATE ===================== */

let players = [];
let courts = 1;
let playCount = {};
let usedPartners = new Set();

let currentRound = null;
let nextRoundData = null;
let sitoutStreak = {};   // consecutive sit-outs per player


/* ===================== HELPERS ===================== */

function key(a, b) {
  return [a, b].sort().join("|");
}

/* ===================== ROUND GENERATION ===================== */

function generateRound() {

  const PLAYERS_PER_ROUND = courts * 4;

  // ---------- Phase 1: Fair Player Selection ----------

  // Defensive initialization
  players.forEach(p => {
    if (playCount[p] === undefined) playCount[p] = 0;
    if (sitoutStreak[p] === undefined) sitoutStreak[p] = 0;
  });

  // Sort players by fairness priority
  let sortedPlayers = [...players].sort((a, b) => {
    if (sitoutStreak[b] !== sitoutStreak[a]) {
      return sitoutStreak[b] - sitoutStreak[a];   // waited longest
    }
    if (playCount[a] !== playCount[b]) {
      return playCount[a] - playCount[b];         // least played
    }
    return Math.random() - 0.5;                    // tie-break randomness
  });

  let playing = sortedPlayers.slice(0, PLAYERS_PER_ROUND);
  let sitting = sortedPlayers.slice(PLAYERS_PER_ROUND);

  // Update sit-out streaks
  players.forEach(p => {
    if (playing.includes(p)) {
      sitoutStreak[p] = 0;
    } else {
      sitoutStreak[p]++;
    }
  });

  // ---------- Phase 2: Court Pairing ----------

  let matches = [];
  let pool = [...playing];

  // Shuffle pool to vary matchups
  pool.sort(() => Math.random() - 0.5);

  for (let i = 1; i <= courts; i++) {
    if (pool.length < 4) break;

    let group = pool.splice(0, 4);

    // All possible team combinations
    let combos = [
      [[group[0], group[1]], [group[2], group[3]]],
      [[group[0], group[2]], [group[1], group[3]]],
      [[group[0], group[3]], [group[1], group[2]]]
    ];

    // Prefer combos with unseen partners
    let chosen =
      combos.find(c =>
        !usedPartners.has(key(c[0][0], c[0][1])) &&
        !usedPartners.has(key(c[1][0], c[1][1]))
      ) || combos[0];

    // Record partners
    usedPartners.add(key(chosen[0][0], chosen[0][1]));
    usedPartners.add(key(chosen[1][0], chosen[1][1]));

    // Increment play counts
    chosen[0].forEach(p => playCount[p]++);
    chosen[1].forEach(p => playCount[p]++);

    matches.push({
      court: i,
      teamA: chosen[0],
      teamB: chosen[1]
    });
  }

  return {
    matches,
    sitouts: sitting
  };
}


// Enforce max 2 consecutive sit-outs (when possible)
let forcedIn = available.filter(p => sitoutStreak[p] >= 2);

forcedIn.forEach(fp => {
  if (matches.length === 0) return;

  let candidates = matches
    .flatMap(m => [...m.teamA, ...m.teamB])
    .filter(p => sitoutStreak[p] === 0);

  if (candidates.length === 0) return;

  let swapOut = candidates[0];

  for (let m of matches) {
    let idxA = m.teamA.indexOf(swapOut);
    if (idxA !== -1) {
      m.teamA[idxA] = fp;
      break;
    }
    let idxB = m.teamB.indexOf(swapOut);
    if (idxB !== -1) {
      m.teamB[idxB] = fp;
      break;
    }
  }

  sitoutStreak[fp] = 0;
  sitoutStreak[swapOut]++;

  available = available.filter(p => p !== fp);
  available.push(swapOut);
});

// Increment sit-out streaks for players who sat out
available.forEach(p => {
  sitoutStreak[p]++;
});

  return { matches, sitouts: available };
}

/* ===================== START / ADVANCE ===================== */

function start() {
  players = document.getElementById("playersInput").value
    .split(",")
    .map(p => p.trim())
    .filter(Boolean);

  courts = parseInt(document.getElementById("courtsInput").value);

playCount = {};
usedPartners.clear();
sitoutStreak = {};

players.forEach(p => {
  	playCount[p] = 0;
 	 sitoutStreak[p] = 0;
});


  currentRound = generateRound();
  nextRoundData = generateRound();

  render();
}

function nextRound() {
  currentRound = nextRoundData;
  nextRoundData = generateRound();
  render();
}

/* ===================== RENDER ===================== */

function renderRound(title, round) {
  let html = `<h2>${title}</h2>`;

  round.matches.forEach(m => {
    html += `
      <div class="card">
        <strong>Court ${m.court}</strong><br>
        ${m.teamA[0]} & ${m.teamA[1]}
        <hr>
        ${m.teamB[0]} & ${m.teamB[1]}
      </div>
    `;
  });

  if (round.sitouts.length) {
    html += `
      <div class="card">
        Sitting out:<br>${round.sitouts.join(", ")}
      </div>
    `;
  }

  return html;
}

function render() {
  let html = "";
  html += renderRound("Current Round", currentRound);
  html += renderRound("Next Match (Preview)", nextRoundData);
  document.getElementById("output").innerHTML = html;
}
</script>

</body>
</html>
